# Динамические upstream'ы для стандартных поддоменов oblgazeta.ru
# Upstream'ы будут создаваться автоматически при появлении контейнеров с метками
# angie.http.upstreams.<subdomain>.port=80

# Объявляем upstream'ы для существующих проектов
upstream p {
    zone p 1m;
}

upstream pdev {
    zone pdev 1m;
}

# upstream для других поддоменов будут добавляться по мере необходимости


# Основной сервер для стандартных поддоменов oblgazeta.ru
server {
    listen 80;
    server_name ~^(?<subdomain>[^.]+)\.oblgazeta\.ru$;

    # Логи для конкретного поддомена (опционально)
    access_log /var/log/angie/access.log main;
    error_log /var/log/angie/error.log warn;

    location / {
        # Проксируем на upstream, имя которого = имя поддомена
        proxy_pass http://$subdomain;
        
        # Стандартные прокси-заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        
        # Отключаем серверные токены
        server_tokens off;
        
        # Настройки для реальных IP (если за бастионом)
        set_real_ip_from 0.0.0.0/0;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;
        
        # Таймауты (общие для всех)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферы для обычных запросов
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}