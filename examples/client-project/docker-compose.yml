name: client-project

services:
  nginx:
    image: nginx:latest
    container_name: client-nginx
    networks:
      - global_proxy
    labels:
      - "angie.http.upstreams.project.port=80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped

networks:
  global_proxy:
    external: true